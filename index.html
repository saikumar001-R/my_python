<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calorie Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
background:#1e293b;
padding:25px;
border-radius:10px;
width:90%;
max-width:400px;
box-shadow:0px 0px 20px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:6px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
font-size:16px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:20px;
padding:15px;
background:#020617;
border-radius:6px;
font-size:16px;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h2>Calorie Calculator</h2>

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Height (cm)</label>
<input type="number" id="height">

<label>Activity Level</label>
<select id="activity">
<option value="1.2">Sedentary (little exercise)</option>
<option value="1.375">Lightly active (1–3 days/week)</option>
<option value="1.55">Moderately active (3–5 days/week)</option>
<option value="1.725">Very active (6–7 days/week)</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let age = document.getElementById("age").value
let weight = document.getElementById("weight").value
let height = document.getElementById("height").value
let gender = document.getElementById("gender").value
let activity = document.getElementById("activity").value

if(age=="" || weight=="" || height==""){
alert("Please fill all fields")
return
}

let bmr

if(gender=="male"){
bmr = 10*weight + 6.25*height - 5*age + 5
}else{
bmr = 10*weight + 6.25*height - 5*age -161
}

let maintenance = Math.round(bmr * activity)

let fatloss = Math.round(maintenance - 400)

let musclegain = Math.round(maintenance + 300)

document.getElementById("result").innerHTML =

"Maintenance Calories: <b>"+maintenance+" kcal</b><br><br>" +

"Fat Loss Calories: <b>"+fatloss+" kcal</b><br><br>" +

"Muscle Gain Calories: <b>"+musclegain+" kcal</b>"

}

</script>

</body>
</html>
