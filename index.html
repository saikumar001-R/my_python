<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Calorie Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.container{

backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:16px;
width:90%;
max-width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
font-size:14px;
}

input,select{

width:100%;
padding:10px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
}

button{

width:100%;
padding:12px;
background:linear-gradient(45deg,#22c55e,#16a34a);
border:none;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.results{

margin-top:20px;
padding:15px;
border-radius:10px;
background:rgba(0,0,0,0.3);
line-height:1.6;
}

.result-title{

font-weight:bold;
margin-bottom:10px;
font-size:17px;

}

.goal-buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.goal-buttons button{
flex:1;
background:#3b82f6;
}

.macro-bar{
background:#334155;
border-radius:10px;
overflow:hidden;
margin:6px 0;
}

.macro-fill{
height:10px;
background:#22c55e;
}

</style>

</head>

<body>

<div class="container">

<h1>Calorie Calculator</h1>

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Height (cm)</label>
<input type="number" id="height">

<label>Activity Level</label>

<select id="activity">
<option value="1.2">Sedentary (little or no exercise)</option>
<option value="1.375">Light activity (1–3 days per week)</option>
<option value="1.55">Moderate activity (3–5 days per week)</option>
<option value="1.725">Very active (6–7 days per week)</option>
<option value="1.9">Extra active (twice per day training / physical job)</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="goal-buttons" id="goalButtons" style="display:none">

<button onclick="showWeightLoss()">Weight Loss</button>

<button onclick="showWeightGain()">Weight Gain</button>

</div>

<div class="results" id="result"></div>

</div>

<script>

let maintenanceCalories
let userWeight
let userAge
let userGender
let userHeight

function calculate(){

let age=document.getElementById("age").value
let weight=document.getElementById("weight").value
let height=document.getElementById("height").value
let gender=document.getElementById("gender").value
let activity=document.getElementById("activity").value

if(age==""||weight==""||height==""){
alert("Please fill all fields")
return
}

userWeight=parseFloat(weight)
userAge=parseFloat(age)
userGender=gender
userHeight=parseFloat(height)

let bmr

if(gender=="male"){
bmr=10*weight+6.25*height-5*age+5
}else{
bmr=10*weight+6.25*height-5*age-161
}

maintenanceCalories=Math.round(bmr*activity)

let heightMeters=height/100
let bmi=weight/(heightMeters*heightMeters)

let bodyFat

if(gender=="male"){
bodyFat=(1.20*bmi)+(0.23*age)-16.2
}else{
bodyFat=(1.20*bmi)+(0.23*age)-5.4
}

showMacros(maintenanceCalories,bmi,bodyFat)

document.getElementById("goalButtons").style.display="flex"

}

function showWeightLoss(){

let calories=maintenanceCalories-400
showMacros(calories)

}

function showWeightGain(){

let calories=maintenanceCalories+300
showMacros(calories)

}

function showMacros(calories,bmi=null,bodyFat=null){

let protein=userWeight*2
let fat=userWeight*0.8

let proteinCalories=protein*4
let fatCalories=fat*9

let remainingCalories=calories-(proteinCalories+fatCalories)

let carbs=remainingCalories/4
let carbCalories=carbs*4

let proteinPercent=(proteinCalories/calories)*100
let carbPercent=(carbCalories/calories)*100
let fatPercent=(fatCalories/calories)*100

let resultHTML=""

if(bmi!=null){

resultHTML+=
"<div class='result-title'>Body Stats</div>"+
"BMI: <b>"+bmi.toFixed(1)+"</b><br>"+
"Body Fat Estimate: <b>"+bodyFat.toFixed(1)+"%</b><br><br>"

}

resultHTML+=

"<div class='result-title'>Calories</div>"+
"Total Calories: <b>"+Math.round(calories)+" kcal</b><br><br>"+

"<div class='result-title'>Macronutrients</div>"+

"Protein: "+Math.round(protein)+" g ("+Math.round(proteinCalories)+" kcal)"+
"<div class='macro-bar'><div class='macro-fill' style='width:"+proteinPercent+"%'></div></div>"+

"Carbs: "+Math.round(carbs)+" g ("+Math.round(carbCalories)+" kcal)"+
"<div class='macro-bar'><div class='macro-fill' style='width:"+carbPercent+"%;background:#3b82f6'></div></div>"+

"Fat: "+Math.round(fat)+" g ("+Math.round(fatCalories)+" kcal)"+
"<div class='macro-bar'><div class='macro-fill' style='width:"+fatPercent+"%;background:#f59e0b'></div></div>"

document.getElementById("result").innerHTML=resultHTML

}

</script>

</body>
</html>
