<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Calorie Calculator</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
}

.container{

backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:16px;
width:90%;
max-width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:25px;
}

label{
font-size:14px;
}

input,select{

width:100%;
padding:10px;
margin-top:6px;
margin-bottom:16px;
border-radius:8px;
border:none;
outline:none;
font-size:14px;
}

button{

width:100%;
padding:12px;
background:linear-gradient(45deg,#22c55e,#16a34a);
border:none;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.results{

margin-top:20px;
padding:15px;
border-radius:10px;
background:rgba(0,0,0,0.3);
line-height:1.6;
}

.result-title{

font-weight:bold;
margin-bottom:10px;
font-size:17px;

}

</style>

</head>

<body>

<div class="container">

<h1>Calorie Calculator</h1>

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Height (cm)</label>
<input type="number" id="height">

<label>Activity Level</label>

<select id="activity">
<option value="1.2">Sedentary (little or no exercise)</option>
<option value="1.375">Light activity (1–3 days per week)</option>
<option value="1.55">Moderate activity (3–5 days per week)</option>
<option value="1.725">Very active (6–7 days per week)</option>
<option value="1.9">Extra active (twice per day training / physical job)</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="results" id="result"></div>

</div>

<script>

function calculate(){

let age=document.getElementById("age").value
let weight=document.getElementById("weight").value
let height=document.getElementById("height").value
let gender=document.getElementById("gender").value
let activity=document.getElementById("activity").value

if(age==""||weight==""||height==""){
alert("Please fill all fields")
return
}

let bmr

if(gender=="male"){
bmr=10*weight+6.25*height-5*age+5
}else{
bmr=10*weight+6.25*height-5*age-161
}

let maintenance=Math.round(bmr*activity)

let fatloss=Math.round(maintenance-400)

let musclegain=Math.round(maintenance+300)

let protein=weight*2
let fat=weight*0.8

let proteinCalories=protein*4
let fatCalories=fat*9

let remainingCalories=maintenance-(proteinCalories+fatCalories)

let carbs=remainingCalories/4
let carbCalories=carbs*4

document.getElementById("result").innerHTML=

"<div class='result-title'>Daily Calories</div>"+

"Maintenance: <b>"+maintenance+" kcal</b><br>"+
"Fat Loss: <b>"+fatloss+" kcal</b><br>"+
"Muscle Gain: <b>"+musclegain+" kcal</b><br><br>"+

"<div class='result-title'>Macronutrients</div>"+

"Protein: <b>"+Math.round(protein)+" g</b> ("+Math.round(proteinCalories)+" kcal)<br>"+
"Carbs: <b>"+Math.round(carbs)+" g</b> ("+Math.round(carbCalories)+" kcal)<br>"+
"Fat: <b>"+Math.round(fat)+" g</b> ("+Math.round(fatCalories)+" kcal)"

}

</script>

</body>
</html>
