<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Calorie Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#020617);
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
background:#1e293b;
padding:30px;
border-radius:12px;
width:90%;
max-width:420px;
box-shadow:0px 10px 30px rgba(0,0,0,0.5);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:none;
border-radius:6px;
font-size:14px;
background:#0f172a;
color:white;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
font-size:16px;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.results{
margin-top:20px;
padding:15px;
background:#020617;
border-radius:8px;
line-height:1.6;
}

.result-title{
font-size:18px;
margin-bottom:10px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Calorie Calculator</h1>

<label>Age</label>
<input type="number" id="age">

<label>Gender</label>
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Weight (kg)</label>
<input type="number" id="weight">

<label>Height (cm)</label>
<input type="number" id="height">

<label>Activity Level</label>
<select id="activity">
<option value="1.2">Sedentary (little or no exercise)</option>
<option value="1.375">Light activity (1–3 days per week)</option>
<option value="1.55">Moderate activity (3–5 days per week)</option>
<option value="1.725">Very active (6–7 days per week)</option>
<option value="1.9">Extra active (twice per day training / physical job)</option>
</select>

<button onclick="calculate()">Calculate</button>

<div class="results" id="result"></div>

</div>

<script>

function calculate(){

let age = document.getElementById("age").value
let weight = document.getElementById("weight").value
let height = document.getElementById("height").value
let gender = document.getElementById("gender").value
let activity = document.getElementById("activity").value

if(age=="" || weight=="" || height==""){
alert("Please fill all fields")
return
}

let bmr

if(gender=="male"){
bmr = 10*weight + 6.25*height - 5*age + 5
}else{
bmr = 10*weight + 6.25*height - 5*age -161
}

let maintenance = Math.round(bmr * activity)

let fatloss = Math.round(maintenance - 400)

let musclegain = Math.round(maintenance + 300)

let protein = weight * 2
let fat = weight * 0.8

let proteinCalories = protein * 4
let fatCalories = fat * 9

let remainingCalories = maintenance - (proteinCalories + fatCalories)

let carbs = remainingCalories / 4
let carbCalories = carbs * 4

document.getElementById("result").innerHTML =

"<div class='result-title'>Daily Calories</div>" +

"Maintenance: <b>"+maintenance+" kcal</b><br>" +
"Fat Loss: <b>"+fatloss+" kcal</b><br>" +
"Muscle Gain: <b>"+musclegain+" kcal</b><br><br>" +

"<div class='result-title'>Macronutrients</div>" +

"Protein: <b>"+Math.round(protein)+" g</b> ("+Math.round(proteinCalories)+" kcal)<br>" +
"Carbs: <b>"+Math.round(carbs)+" g</b> ("+Math.round(carbCalories)+" kcal)<br>" +
"Fat: <b>"+Math.round(fat)+" g</b> ("+Math.round(fatCalories)+" kcal)"

}

</script>

</body>
</html>
